    <table class="table table-striped contenedor">
        <thead>
            <th>Tabla de multiplicar</th>
        </thead>
        <tbody>
            <script>
                (function () {
                    const max = 20;
                    const table = document.querySelector('table.table.contenedor');
                    const tbody = table.querySelector('tbody');

                    // Clear tbody in case there's placeholder content
                    tbody.innerHTML = '';

                    for (let i = 1; i <= max; i++) {
                        const tr = document.createElement('tr');
                        for (let j = 1; j <= max; j++) {
                            const td = document.createElement('td');
                            td.textContent = i * j;
                            tr.appendChild(td);
                        }
                        tbody.appendChild(tr);
                    }
                })();
            </script>
        </tbody>
    </table>
