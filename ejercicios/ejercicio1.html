<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="header text-center">
        <h1>Ejercicio 1</h1>
    </div>
    <div class="container text-center py-2">
        <h4 class="instruccion text-center">
            Leer un número y mostrar si dicho número es o no es par.
        </h4>
        <script type="text/JavaScript">
            alert("Leer un número y mostrar si dicho número es o no es par.")
            let num = parseInt(prompt("Ingrese un numero: "));
            if (num % 2 == 0) {
                document.write("<br><h5>El numero es par</h5>");
            } else {
                document.write("<br><h5>El numero es impar</h5>");
            }
        </script>
    </div>
    <div class="footer retorno-botton text-center py-3">
        <button type="button" class="btn btn-warning" onclick="window.location.href='../navegador.html'">Volver</button>
    </div>
</body>

</html>
