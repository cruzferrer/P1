<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="header text-center">
        <h1>Ejercicio 3</h1>
    </div>
    <div class="container text-center py-2">
        <h4 class="instruccion text-center">
            Leer dos números y realizar el producto mediante sumas.
        </h4>
        <script type="text/JavaScript">
            alert("Leer dos números y realizar el producto mediante sumas.")
            let num1 = parseInt(prompt("Ingrese el segundo numero: "));
            let num2 = parseInt(prompt("Ingresa el segundo numero: "));
            let suma = 0;
            document.write("<br><h5>Producto de " + num1 + " sumado " + num2 + " veces:</h5>");
            for (let i = 1; i <= num2; i++) {

                if( i < num2){
                    document.write(num1 + " + ");
                }
                else{
                    document.write(num1 + ". ");
                }

                suma += num1;
            }

            document.write("<br><h5>Resultado: " + suma +  " veces:</h5>");
        </script>
    </div>
    <div class="footer retorno-botton text-center py-3">
        <button type="button" class="btn btn-warning" onclick="window.location.href='../navegador.html'">Volver</button>
    </div>
</body>

</html>
