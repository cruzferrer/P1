<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="header text-center">
        <h1>Ejercicio 2</h1>
    </div>
    <div class="container text-center py-2">
        <h4 class="instruccion text-center">
            Tablas de multiplicar hasta del Tamano N por N con do-while.
        </h4>
        <script type="text/JavaScript">
            alert("Tablas de multiplicar hasta del Tamano N por N")
            let n = parseInt(prompt("Ingrese un numero: "));
            let i = 0;
            document.write("<table class='table table-bordered'>");
                document.write("<thead>");
                document.write("<tr>");
                do
                {
                    document.write("<th>"+i+"</th>");
                    i++
                }while(i <= n);
                document.write("</tr>");
                document.write("</thead>");
                document.write("<tbody>");
                i = 1;
                let j = 0;
                do
                {
                    document.write("<tr>");
                    do
                    {
                        if(j === 0) document.write("<th>"+i+"</th>");
                        else document.write("<td>"+(i*j)+"</td>");
                        j++;
                    }while(j <= n);
                    document.write("</tr>");
                    i++
                    j = 0;
                }while(i <= n);
                document.write("</tbody>");
            document.write("</table>");

        </script>
    </div>
    <div class="footer retorno-botton text-center py-3">
        <button type="button" class="btn btn-warning"
            onclick="window.location.href='../../navegador.html'">Volver</button>
    </div>
</body>

</html>
