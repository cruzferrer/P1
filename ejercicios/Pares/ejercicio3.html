<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="header text-center">
        <h1>Ejercicio 1</h1>
    </div>
    <div class="container text-center py-2">
        <h4 class="instruccion text-center">
            Mostrar enteros pares con for </h4>
        <script type="text/JavaScript">
            alert("Mostrar de n enteros con while")
            let n = parseInt(prompt("Ingrese un numero n: "));
            let i = 1;
            do
            {
                if(i % 2 == 0)
                {
                    if( i<n)
                    {
                        document.write(i  + " , ");
                    }else
                    {
                        document.write(i);
                    }
                }
                i++
            }while(i <= n);

        </script>
    </div>
    <div class="footer retorno-botton text-center py-3">
        <button type="button" class="btn btn-warning"
            onclick="window.location.href='../../navegador.html'">Volver</button>
    </div>
</body>

</html>
